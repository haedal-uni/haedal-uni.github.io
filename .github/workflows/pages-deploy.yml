name: 'Automatic build'
on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

jobs:
  continuous-delivery:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # for posts's lastmod

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: false

      - name: Check ruby & gem versions (디버깅용)
        run: |
          ruby -v
          gem -v
          bundle -v || true

      - name: Install bundler (최신 허용)
        run: gem install bundler
        
      - name: Deploy
        run: bash tools/deploy.sh


